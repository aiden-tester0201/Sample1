<title>샘플 운영 관리 시스템</title>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js" onerror="window._xlsxUnavailable=true"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--navy-deep:#0d2240;--navy:#1e3a5f;--navy-h:#274e80;--amber:#f59e0b;--surf:#f0f4f8;--white:#fff;--brd:#e2e8f0;--tp:#0f172a;--ts:#4a5568;--tm:#94a3b8;--s-req:#3b82f6;--s-req-bg:#eff6ff;--s-prep:#f97316;--s-prep-bg:#fff7ed;--s-fb:#8b5cf6;--s-fb-bg:#f5f3ff;--s-done:#16a34a;--s-done-bg:#f0fdf4;--s-rej:#dc2626;--s-rej-bg:#fef2f2;--bb:#6d28d9;--bb-bg:#ede9fe}
/* 상태: 샘플 요청=파랑, 샘플 준비 중=주황, 샘플 발송=보라, 샘플 회수=초록 */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--surf);color:var(--tp);font-size:13px;line-height:1.5}
button,input,select,textarea{font-family:inherit}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--navy-deep);display:flex;flex-direction:column;flex-shrink:0;user-select:none}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sb-logo-main{color:#fff;font-size:12.5px;font-weight:800;line-height:1.3}
.sb-logo-sub{color:var(--amber);font-size:10.5px;margin-top:2px}
.sb-nav{padding:10px 8px;flex:1}
.sb-sec{font-size:9.5px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:.1em;text-transform:uppercase;padding:10px 10px 6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:6px;cursor:pointer;color:rgba(255,255,255,.55);font-size:12.5px;font-weight:500;transition:all .12s;margin-bottom:1px}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.nav-item.active{background:rgba(255,255,255,.12);color:#fff;font-weight:600}
.nav-item.active .ndot{background:var(--amber)}
.ndot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0}
.sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3);font-size:10.5px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--brd);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
.topbar-l{display:flex;align-items:center;gap:8px;min-width:0}
.topbar-title{font-size:14.5px;font-weight:800;color:var(--navy-deep);white-space:nowrap}
.topbar-r{display:flex;align-items:center;gap:5px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:16px 20px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:5px;font-size:12px;font-weight:600;border:none;transition:all .12s;white-space:nowrap;cursor:pointer}
.btn-p{background:var(--navy);color:#fff}.btn-p:hover{background:var(--navy-h)}
.btn-o{background:#fff;color:var(--ts);border:1px solid var(--brd)}.btn-o:hover{background:var(--surf)}
.btn-g{background:#16a34a;color:#fff}.btn-g:hover{background:#15803d}
.btn-r{background:#dc2626;color:#fff}.btn-r:hover{background:#b91c1c}
.btn-sm{padding:5px 10px;font-size:11.5px}
/* Corp tabs */
.corp-tabs{display:flex;gap:0;border-bottom:2px solid var(--brd);margin-bottom:14px}
.ct{padding:8px 16px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--tm);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .12s;background:none;border-top:none;border-left:none;border-right:none}
.ct:hover{color:var(--ts)}
.ct.active{color:var(--navy);border-bottom-color:var(--navy)}
.ct.active-bb{color:var(--bb);border-bottom-color:var(--bb)}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi-card{background:#fff;border-radius:8px;padding:16px;border:1px solid var(--brd);display:flex;align-items:flex-start;gap:12px}
.kpi-ico{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.kpi-v{font-size:26px;font-weight:900;color:var(--tp);font-variant-numeric:tabular-nums;line-height:1}
.kpi-l{font-size:11px;color:var(--ts);margin-top:3px;line-height:1.3}
/* Charts */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.chart-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.chart-card{background:#fff;border-radius:8px;border:1px solid var(--brd);padding:16px;overflow:hidden}
.chart-scroll::-webkit-scrollbar{width:6px}
.chart-scroll::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
.chart-scroll::-webkit-scrollbar-track{background:transparent}
.chart-title{font-size:12px;font-weight:700;color:var(--ts);margin-bottom:12px}
.sec-divider{display:flex;align-items:center;gap:10px;margin:6px 0 14px}
.sec-divider::after{content:"";flex:1;height:1px;background:var(--brd)}
.sec-divider span{font-size:12.5px;font-weight:800;color:var(--navy-deep);background:#fff;border:1px solid var(--brd);padding:4px 12px;border-radius:20px;white-space:nowrap}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--ts)}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
/* Badge */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-req{background:var(--s-req-bg);color:var(--s-req)}.b-prep{background:var(--s-prep-bg);color:var(--s-prep)}
.b-fb{background:var(--s-fb-bg);color:var(--s-fb)}.b-done{background:var(--s-done-bg);color:var(--s-done)}
/* 자동화: 지연 배지 & 강조 */
.b-delay{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.b-delay-strong{background:#dc2626;color:#fff}
.delay-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#dc2626;margin-right:4px;animation:delayPulse 1.6s ease-in-out infinite}
@keyframes delayPulse{0%,100%{opacity:1}50%{opacity:.35}}
tr.row-delayed{background:#fff5f5 !important}
tr.row-delayed:hover{background:#ffecec !important}
.alert-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:linear-gradient(90deg,#fef2f2,#fff);border:1px solid #fecaca;border-left:4px solid #dc2626;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px}
.alert-bar .ab-icon{font-size:17px}
.alert-bar .ab-title{font-weight:700;color:#dc2626}
.alert-bar .ab-chip{background:#dc2626;color:#fff;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700}
.alert-bar .ab-sub{color:#991b1b;font-size:12px}
.alert-bar .ab-btn{margin-left:auto;background:#dc2626;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer}
.alert-bar .ab-btn:hover{background:#b91c1c}
.b-rej{background:var(--s-rej-bg);color:var(--s-rej)}
.corp-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:10.5px;font-weight:700}
.cb-g{background:#dbeafe;color:#1d4ed8}.cb-bb{background:var(--bb-bg);color:var(--bb)}
/* Table */
.tw{background:#fff;border-radius:8px;border:1px solid var(--brd);overflow:hidden}
.tscroll{overflow-x:auto}
/* 상단 가로 스크롤바 (아래 테이블과 동기화) */
.top-scroll{overflow-x:auto;overflow-y:hidden;height:14px}
.top-scroll>div{height:1px}
.top-scroll::-webkit-scrollbar{height:10px}
.top-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:5px}
.top-scroll::-webkit-scrollbar-thumb:hover{background:#94a3b8}
.top-scroll::-webkit-scrollbar-track{background:#f1f5f9;border-radius:5px}
table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
thead th{background:var(--navy);color:#fff;font-size:11px;font-weight:600;padding:8px 10px;text-align:left;white-space:nowrap;border-right:1px solid rgba(255,255,255,.1)}
thead th:last-child{border-right:none}
.gh th{background:var(--navy-deep);font-size:9.5px;text-align:center;text-transform:uppercase;letter-spacing:.08em;padding:5px 10px;color:rgba(255,255,255,.7)}
.fth{display:inline-flex;align-items:center;gap:3px}
.fbtn{background:none;border:none;color:rgba(255,255,255,.5);font-size:9px;padding:1px 2px;cursor:pointer;border-radius:2px}
.fbtn:hover{color:#fff;background:rgba(255,255,255,.15)}
tbody tr{border-bottom:1px solid var(--brd);cursor:pointer;transition:background .1s}
tbody tr:hover{background:#f8fafc}tbody tr:last-child{border-bottom:none}
td{padding:8px 10px;font-size:12px;color:var(--tp);vertical-align:middle;white-space:nowrap;border-right:1px solid var(--brd)}
.td-editable{cursor:text;transition:background .1s}
.td-editable:hover{background:#eff6ff;outline:1px dashed #93c5fd;outline-offset:-2px}
.cell-edit{width:100%;padding:5px 7px;border:1.5px solid var(--navy);border-radius:4px;font-size:12px;font-family:inherit;background:#fff;color:var(--tp)}
.cell-edit:focus{outline:none;box-shadow:0 0 0 2px rgba(30,58,95,.15)}
td:last-child{border-right:none}
.td-tr{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.chk-c{width:32px;padding:0 8px;text-align:center}
input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--navy)}
tr.row-sel{background:#eff6ff!important}
/* Filter menu */
.fw{position:relative;display:inline-flex}
.fm{position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid var(--brd);border-radius:6px;padding:4px;z-index:200;min-width:130px;box-shadow:0 4px 16px rgba(0,0,0,.12);display:none}
.fm.open{display:block}
.fmi{padding:5px 10px;font-size:12px;cursor:pointer;border-radius:4px;color:var(--tp);white-space:nowrap}
.fmi:hover{background:var(--surf)}.fmi.sel{background:var(--navy);color:#fff}
/* Board */
.vtog{display:flex;gap:3px;background:var(--surf);border-radius:6px;padding:3px}
.vt{padding:5px 13px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--ts);transition:all .12s}
.vt.active{background:#fff;color:var(--tp);box-shadow:0 1px 3px rgba(0,0,0,.1);font-weight:700}
/* Relative date */
.rd{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px}
.rd-u{background:var(--s-rej-bg);color:var(--s-rej)}.rd-w{background:var(--s-prep-bg);color:var(--s-prep)}
.rd-n{background:var(--surf);color:var(--ts)}.rd-d{color:var(--tm);font-size:11px}
/* Avatar */
.av{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.av-row{display:flex;align-items:center;gap:5px}
/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:start}
.k-col{background:var(--surf);border-radius:8px;overflow:hidden;border:1px solid var(--brd)}
.k-hdr{padding:9px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd);background:#fff}
.k-hl{font-size:11.5px;font-weight:700;display:flex;align-items:center;gap:6px}
.k-cnt{background:rgba(0,0,0,.07);border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700}
.k-body{padding:8px;display:flex;flex-direction:column;gap:7px;min-height:60px}
.k-card{background:#fff;border-radius:6px;padding:11px;border:1px solid var(--brd);cursor:pointer;transition:box-shadow .12s}
.k-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.1)}
.k-title{font-size:12px;font-weight:700;margin-bottom:6px;line-height:1.4;white-space:normal}
.k-meta{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--ts)}
/* Slide panel */
.overlay{position:fixed;inset:0;background:rgba(13,34,64,.35);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(1px)}
.overlay.open{opacity:1;pointer-events:all}
.slide-panel{position:fixed;top:0;right:-470px;width:454px;height:100vh;background:#fff;z-index:101;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.16,1,.3,1);box-shadow:-6px 0 32px rgba(0,0,0,.14)}
.slide-panel.open{right:0}
.sp-in{display:flex;flex:1;overflow:hidden}
.sp-acc{width:5px;background:var(--amber);flex-shrink:0}
.sp-body{flex:1;overflow-y:auto;padding:18px 18px 0}
.sp-hdr{padding-bottom:12px;border-bottom:1px solid var(--brd);margin-bottom:14px}
.sp-ht{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.sp-rn{font-size:12.5px;font-weight:800;color:var(--navy);line-height:1.4}
.sp-cl{background:none;border:none;font-size:20px;color:var(--tm);padding:0;line-height:1;cursor:pointer}
.sp-sub{font-size:11px;color:var(--tm);margin-top:4px;display:flex;align-items:center;gap:6px}
.sp-sec{margin-bottom:14px}
.sp-st{font-size:9.5px;font-weight:800;color:var(--tm);letter-spacing:.09em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sp-st::after{content:'';flex:1;height:1px;background:var(--brd)}
.fr{display:flex;gap:8px;margin-bottom:8px}
.fg{flex:1;min-width:0}
.fl{font-size:11px;font-weight:600;color:var(--ts);margin-bottom:3px;display:block}
.fi,.fs,.fta{width:100%;padding:6px 8px;border:1px solid var(--brd);border-radius:5px;font-size:12px;color:var(--tp);transition:border-color .12s;background:#fff}
.fi:focus,.fs:focus,.fta:focus{outline:none;border-color:var(--navy)}
.fta{resize:vertical;min-height:68px;line-height:1.5}
.st-opts{display:flex;gap:5px;flex-wrap:wrap}
.st-o{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid transparent;opacity:.6;transition:all .12s}
.st-o:hover{opacity:.85}.st-o.sel{opacity:1;border-color:currentColor}
.file-item{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--surf);border-radius:5px;border:1px solid var(--brd);font-size:11.5px;color:var(--ts);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-foot{padding:12px 18px;border-top:1px solid var(--brd);display:flex;gap:7px;justify-content:space-between;align-items:center;flex-shrink:0;flex-wrap:wrap}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(13,34,64,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:10px;width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.mh{padding:18px 20px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mt{font-size:14px;font-weight:800;color:var(--navy-deep)}
.mc{background:none;border:none;font-size:20px;color:var(--tm);cursor:pointer;line-height:1}
.mb{padding:16px 20px;overflow-y:auto;flex:1}
.mf{padding:12px 20px;border-top:1px solid var(--brd);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.err-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--brd);font-size:12px}
.err-row:last-child{border-bottom:none}
.eb{padding:2px 7px;border-radius:4px;font-size:10.5px;font-weight:700;flex-shrink:0}
.eb-e{background:var(--s-rej-bg);color:var(--s-rej)}.eb-w{background:var(--s-prep-bg);color:var(--s-prep)}
.imp-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--brd);border-radius:6px;margin-bottom:8px;cursor:pointer;transition:border-color .12s}
.imp-opt:hover,.imp-opt.sel{border-color:var(--navy);background:#f8fafc}
.imp-opt input[type=radio]{accent-color:var(--navy)}
/* Toast */
#tc{position:fixed;bottom:20px;right:20px;z-index:400;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--navy-deep);color:#fff;padding:10px 16px;border-radius:7px;font-size:12px;font-weight:500;min-width:200px;max-width:320px;display:flex;align-items:flex-start;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:tIn .2s ease;pointer-events:all}
.t-ico{font-size:14px;flex-shrink:0}
.t-s{border-left:4px solid var(--s-done)}.t-e{border-left:4px solid var(--s-rej)}.t-w{border-left:4px solid var(--amber)}.t-i{border-left:4px solid var(--s-req)}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* PA Guide */
.g-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.g-tab{padding:6px 14px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--brd);background:#fff;color:var(--ts);transition:all .12s}
.g-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.g-sec{background:#fff;border-radius:8px;border:1px solid var(--brd);margin-bottom:12px;overflow:hidden}
.g-sh{background:var(--navy-deep);color:#fff;padding:12px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.g-bd{padding:16px}
.flow-wrap{display:flex;align-items:center;gap:0;flex-wrap:wrap;margin:10px 0}
.fb{background:var(--surf);border:1px solid var(--brd);border-radius:6px;padding:8px 12px;font-size:12px;font-weight:600;text-align:center}
.fa{font-size:16px;color:var(--tm);padding:0 6px}
.sc-tbl{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:8px}
.sc-tbl th{background:var(--navy);color:#fff;padding:7px 10px;text-align:left;font-weight:600;font-size:11px}
.sc-tbl td{padding:6px 10px;border-bottom:1px solid var(--brd);vertical-align:top}
.sc-tbl tr:last-child td{border-bottom:none}
.code-block{background:#1e293b;color:#e2e8f0;padding:14px;border-radius:6px;font-family:'Cascadia Code','Consolas',monospace;font-size:11.5px;line-height:1.6;overflow-x:auto;white-space:pre;margin-bottom:10px}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd)}
.cl-item:last-child{border-bottom:none}
.cl-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--navy);flex-shrink:0;margin-top:1px}
.email-preview{background:#f8fafc;border:1px solid var(--brd);border-radius:6px;padding:14px;font-size:12px;line-height:1.7;margin-bottom:10px}
.email-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;color:#fff}
.empty{text-align:center;padding:36px 20px;color:var(--tm);font-size:12px}
</style>

<input type="file" id="ifi" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleImportFile(event)">
<div id="root"></div>
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="slide-panel" id="slidePanel">
  <div class="sp-in">
    <div class="sp-acc"></div>
    <div class="sp-body" id="panelBody"></div>
  </div>
  <div class="sp-foot" id="panelFoot"></div>
</div>
<div id="mc"></div>
<div id="tc"></div>
<div id="authGate"></div>
<style>
#authGate{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#0d2240,#1e3a5f);display:none;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif}
#authGate.show{display:flex}
.auth-card{background:#fff;border-radius:14px;padding:32px 30px;width:360px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.auth-logo{font-size:16px;font-weight:800;color:#0d2240;text-align:center}
.auth-sub{font-size:12px;color:#94a3b8;text-align:center;margin-top:4px;margin-bottom:22px}

<script>
// 실제 오늘 날짜 사용 (시:분:초 제거하여 날짜만 비교)
const TODAY = (()=>{const d=new Date();d.setHours(0,0,0,0);return d;})();
// 2단계 MD - 진행 상태 4가지 고정값 (띄어쓰기 포함)
const STATUS_MAP={'샘플 요청':{cls:'b-req',icon:'📝',color:'#3b82f6'},'샘플 준비 중':{cls:'b-prep',icon:'🔄',color:'#f97316'},'샘플 발송':{cls:'b-fb',icon:'📤',color:'#8b5cf6'},'샘플 회수':{cls:'b-done',icon:'✅',color:'#16a34a'}};
const STATUSES=Object.keys(STATUS_MAP);

// ════════════════════════════════════════════════════════════════
//  자동화: 지연 판정 (1단계 · 무료 · AI 불필요)
//  · 준비기한(dueDate) 지남: 아직 발송 전인데 기한 지남
//  · 피드백기한(feedbackDate) 지남: 발송했는데 피드백 기한 지남
// ════════════════════════════════════════════════════════════════
function _parseDate(v){
  if(!v||String(v).trim()==='')return null;
  const s=String(v).trim().replace(/[./]/g,'-');
  const d=new Date(s);
  if(isNaN(d.getTime()))return null;
  d.setHours(0,0,0,0);
  return d;
}
// 며칠 지났는지 (양수=지남, 0=오늘, 음수=남음). 날짜 없으면 null
function _daysOverdue(v){
  const d=_parseDate(v);
  if(!d)return null;
  return Math.round((TODAY - d)/86400000);
}
// 한 건의 지연 상태를 판정해서 배열로 반환 (여러 지연 동시 가능)
function getDelays(s){
  const out=[];
  const st=s.status||'';
  // 준비기한 지연: 아직 발송/회수 안 됐는데 준비기한이 지남
  if(st==='샘플 요청'||st==='샘플 준비 중'){
    const od=_daysOverdue(s.dueDate);
    if(od!==null && od>=1) out.push({type:'prep',label:'준비기한 초과',days:od,date:s.dueDate});
  }
  // 피드백기한 지연: 발송했는데 피드백 기한이 지남 (단, 사업자 피드백란이 비어있을 때만)
  if(st==='샘플 발송'){
    const hasFeedback=String(s.operatorFeedback||'').trim()!=='';
    if(!hasFeedback){
      const od=_daysOverdue(s.feedbackDate);
      if(od!==null && od>=1) out.push({type:'fb',label:'피드백기한 초과',days:od,date:s.feedbackDate});
    }
  }
  return out;
}
function isDelayed(s){return getDelays(s).length>0;}

// ════════════════════════════════════════════════════════════════
//  자동화 2단계: 월말 현황 요약 (무료 · AI 불필요 · 정형 집계)
// ════════════════════════════════════════════════════════════════
// 해당 연도 1월 ~ 선택월 말까지 누적 대상인지 (피드백 예정일 기준)
function _inYTD(dateStr, year, month){
  const d=_parseDate(dateStr);
  if(!d)return false;
  return d.getFullYear()===year && d.getMonth()<=month;
}
// 월말 요약 데이터 생성 (누적: 해당 연도 1월~선택월). corp: 법인, y/m: 연/월(0-based)
function buildMonthlySummary(corp, y, m){
  const all=filteredBy(corp, null);
  // 누적 대상: 피드백 예정일이 해당 연도이고 선택월 이하인 건
  const monthly=all.filter(s=>_inYTD(s.feedbackDate, y, m));
  // 상태별 집계 (전체 기준)
  const byStatus={};
  STATUSES.forEach(st=>byStatus[st]=all.filter(s=>s.status===st).length);
  // 팀별 집계 (전체 기준)
  const byTeam={};
  all.forEach(s=>{const t=s.salesDept||'미지정';byTeam[t]=(byTeam[t]||0)+1;});
  // 회수 현황
  const returned=all.filter(s=>String(s.isReturned).trim()==='회수').length;
  const notReturned=all.filter(s=>String(s.isReturned).trim()==='미회수').length;
  const returnBase=returned+notReturned;
  const returnRate=returnBase>0?Math.round(returned/returnBase*100):0;
  // 수주 현황
  const ordered=all.filter(s=>String(s.isOrdered).trim()==='수주').length;
  // 지연 현황 (현재 시점)
  let prepDelay=0, fbDelay=0;
  all.forEach(s=>getDelays(s).forEach(d=>{if(d.type==='prep')prepDelay++;else fbDelay++;}));
  // 이번 달 신규 요청 (피드백 예정 월 기준으로는 부적절하므로 요청명 날짜는 생략, 상태 요청 건수만)
  return {
    corp, year:y, month:m,
    total:all.length,
    monthlyCount:monthly.length,
    monthly, byStatus, byTeam,
    returned, notReturned, returnRate, ordered,
    prepDelay, fbDelay, totalDelay:prepDelay+fbDelay
  };
}
// 요약을 사람이 읽는 텍스트로 (다운로드용)
function summaryToText(sm){
  const mm=(sm.month+1);
  const L=[];
  L.push(`■ ${sm.corp} 샘플 운영 현황 요약 (${sm.year}년 1~${mm}월 누적)`);
  L.push(`생성일: ${new Date().toLocaleDateString('ko-KR')}`);
  L.push('');
  L.push(`[전체 현황]`);
  L.push(`· 전체 샘플: ${sm.total}건`);
  L.push(`· ${sm.year}년 1~${mm}월 누적 피드백 예정: ${sm.monthlyCount}건`);
  L.push('');
  L.push(`[진행 상태별]`);
  STATUSES.forEach(st=>L.push(`· ${st}: ${sm.byStatus[st]}건`));
  L.push('');
  L.push(`[팀별 현황]`);
  Object.entries(sm.byTeam).sort((a,b)=>b[1]-a[1]).forEach(([t,c])=>L.push(`· ${t}: ${c}건`));
  L.push('');
  L.push(`[회수·수주]`);
  L.push(`· 회수 완료: ${sm.returned}건 / 미회수: ${sm.notReturned}건 (회수율 ${sm.returnRate}%)`);
  L.push(`· 수주: ${sm.ordered}건`);
  L.push('');
  L.push(`[기한 초과 (현재 시점)]`);
  L.push(`· 준비기한 초과: ${sm.prepDelay}건`);
  L.push(`· 피드백기한 초과: ${sm.fbDelay}건`);
  L.push(`· 합계: ${sm.totalDelay}건`);
  return L.join('\n');
}
// 요약 모달 상태
let _summaryYM=null; // {y, m}
function openSummary(){
  const now=new Date();
  // 기본값: 지난달(월말 요약이므로) — 단, 이번 달 데이터가 더 유용하면 이번 달로
  _summaryYM={y:now.getFullYear(), m:now.getMonth()};
  renderSummaryModal();
}
function shiftSummaryMonth(delta){
  if(!_summaryYM)return;
  let y=_summaryYM.y, m=_summaryYM.m+delta;
  if(m<0){m=11;y--;} if(m>11){m=0;y++;}
  _summaryYM={y,m};
  renderSummaryModal();
}
function renderSummaryModal(){
  const corp=state.masterCorp||'그룹';
  const {y,m}=_summaryYM;
  const sm=buildMonthlySummary(corp, y, m);
  const mm=m+1;
  const statusRows=STATUSES.map(st=>{
    const c=sm.byStatus[st]; const info=STATUS_MAP[st];
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9">
      <span><span class="badge ${info.cls}">${info.icon} ${st}</span></span>
      <b style="font-size:15px">${c}건</b></div>`;
  }).join('');
  const teamRows=Object.entries(sm.byTeam).sort((a,b)=>b[1]-a[1]).map(([t,c])=>
    `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f1f5f9"><span>${esc(t)}</span><b>${c}건</b></div>`
  ).join('')||'<div style="color:#94a3b8;padding:5px 0">데이터 없음</div>';

  const html=`
  <div class="modal" style="max-width:640px;width:92vw;padding:20px;max-height:85vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <h3 style="margin:0;font-size:16px">📊 월말 현황 요약</h3>
      <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8">×</button>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin:10px 0 16px">
      <button class="btn btn-o btn-sm" onclick="shiftSummaryMonth(-1)">◀ 이전달</button>
      <div style="font-weight:800;font-size:15px;min-width:150px;text-align:center">${corp} · ${y}년 1~${mm}월 누적</div>
      <button class="btn btn-o btn-sm" onclick="shiftSummaryMonth(1)">다음달 ▶</button>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div style="background:#eff6ff;border-radius:8px;padding:12px"><div style="font-size:22px;font-weight:900;color:#1e3a5f">${sm.total}</div><div style="font-size:11px;color:#64748b">전체 샘플</div></div>
      <div style="background:#f5f3ff;border-radius:8px;padding:12px"><div style="font-size:22px;font-weight:900;color:#7c3aed">${sm.monthlyCount}</div><div style="font-size:11px;color:#64748b">1~${mm}월 누적 피드백 예정</div></div>
      <div style="background:#f0fdf4;border-radius:8px;padding:12px"><div style="font-size:22px;font-weight:900;color:#16a34a">${sm.returnRate}%</div><div style="font-size:11px;color:#64748b">회수율 (${sm.returned}/${sm.returned+sm.notReturned})</div></div>
      <div style="background:${sm.totalDelay>0?'#fef2f2':'#f8fafc'};border-radius:8px;padding:12px"><div style="font-size:22px;font-weight:900;color:${sm.totalDelay>0?'#dc2626':'#64748b'}">${sm.totalDelay}</div><div style="font-size:11px;color:#64748b">기한 초과 (준비${sm.prepDelay}·피드백${sm.fbDelay})</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:4px">진행 상태별</div>
        ${statusRows}
      </div>
      <div>
        <div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:4px">팀별 현황</div>
        ${teamRows}
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:18px;justify-content:flex-end">
      <button class="btn btn-o btn-sm" onclick="copySummary()">📋 텍스트 복사</button>
      <button class="btn btn-p btn-sm" onclick="downloadSummary()">📥 텍스트 다운로드</button>
    </div>
  </div>`;
  const mc=document.getElementById('mc');
  mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">${html}</div>`;
}
function copySummary(){
  const corp=state.masterCorp||'그룹';
  const sm=buildMonthlySummary(corp,_summaryYM.y,_summaryYM.m);
  const txt=summaryToText(sm);
  navigator.clipboard.writeText(txt).then(
    ()=>showToast('요약이 복사되었습니다','success'),
    ()=>showToast('복사 실패 — 다운로드를 이용하세요','warning')
  );
}
function downloadSummary(){
  const corp=state.masterCorp||'그룹';
  const sm=buildMonthlySummary(corp,_summaryYM.y,_summaryYM.m);
  const txt=summaryToText(sm);
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`${corp}_월말요약_${sm.year}-${String(sm.month+1).padStart(2,'0')}.txt`;
  a.click(); URL.revokeObjectURL(url);
  showToast('요약 파일이 다운로드되었습니다','success');
}

function normalizeYear(v){
  if(v===undefined||v===null||String(v).trim()==='')return 2026;
  const digits=String(v).replace(/[^0-9]/g,'');
  const n=parseInt(digits,10);
  return Number.isFinite(n)&&n>0?n:2026;
}

async function _sbSeedIfEmpty(){
  if(!_sb)return;
  try{
    const {count,error}=await _sb.from('samples').select('id',{count:'exact',head:true});
    if(error)throw error;
    if(!count){
      const rows=samples.map(s=>({id:s.id,data:s,updated_at:new Date().toISOString()}));
      if(rows.length){await _sb.from('samples').insert(rows);}

}

async function initData(){
  // year 값 정규화(기본 데이터)
  samples.forEach(s=>{const nv=normalizeYear(s.year);if(s.year!==nv)s.year=nv;});
  if(_sb){
    await _sbSeedIfEmpty();
    const loaded=await _sbLoadAll();
    if(loaded&&loaded.length){
      loaded.forEach(s=>{const nv=normalizeYear(s.year);if(s.year!==nv)s.year=nv;});
      samples=loaded;
    }
  }else{
    // 서버 미연결 시 로컬 백업 사용
    const saved=loadSamples();if(saved&&saved.length)samples=saved;
  }
  _localBackup();
  render();
}

// items: [{label,value,color,filterKey,filterVal}] — filterKey/filterVal used for click-through
function svgHBar(items,opts={}){
  const{barH=20,gap=7,labelW=110}=opts;
  if(!items.length)return '<div style="color:var(--tm);font-size:12px;padding:8px 0">데이터 없음</div>';
  const maxV=Math.max(...items.map(i=>i.value),1),barW=200,totalW=labelW+barW+36,h=items.length*(barH+gap)+gap;
  let s=`<svg width="100%" height="${h}" viewBox="0 0 ${totalW} ${h}" preserveAspectRatio="xMinYMin meet" xmlns="http://www.w3.org/2000/svg">`;
  items.forEach((it,i)=>{
    const y=gap+i*(barH+gap),bw=Math.max((it.value/maxV)*barW,it.value>0?3:0);
    const click=it.filterKey?`onclick="showChartList('${esc(it.filterKey)}','${esc(it.filterVal)}','${esc(it.label)}')" style="cursor:pointer"`:'';
    s+=`<g ${click}>`;
    s+=`<text x="${labelW-6}" y="${y+barH/2+4}" text-anchor="end" font-size="11" fill="#4a5568">${esc(it.label)}</text>`;
    s+=`<rect x="${labelW}" y="${y}" width="${barW}" height="${barH}" fill="#f0f4f8" rx="3"/>`;
    if(bw>0)s+=`<rect x="${labelW}" y="${y}" width="${bw}" height="${barH}" fill="${it.color||'#3b82f6'}" rx="3"/>`;
    s+=`<rect x="${labelW}" y="${y}" width="${barW}" height="${barH}" fill="transparent"/>`;
    s+=`<text x="${labelW+barW+6}" y="${y+barH/2+4}" font-size="11" font-weight="700" fill="#0f172a">${it.value}</text>`;
    s+=`</g>`;
  });
  return s+'</svg>';
}

// 도넛 차트: items=[{label,value,color,filterKey,filterVal}]
function svgDonut(items,opts={}){
  const{size=160,thickness=26}=opts;
  const total=items.reduce((a,i)=>a+i.value,0);
  if(!items.length||total===0)return '<div style="color:var(--tm);font-size:12px;padding:8px 0">데이터 없음</div>';
  const r=size/2,inner=r-thickness,cx=r,cy=r;
  let ang=-90,paths='';
  items.forEach(it=>{
    const frac=it.value/total;
    const sweep=Math.min(frac*360,359.99); // 360도 완전원이면 시작/끝점이 같아져 path가 깨지므로 약간 줄임
    const a1=ang*Math.PI/180,a2=(ang+sweep)*Math.PI/180;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const ix1=cx+inner*Math.cos(a1),iy1=cy+inner*Math.sin(a1),ix2=cx+inner*Math.cos(a2),iy2=cy+inner*Math.sin(a2);
    const large=sweep>180?1:0;
    const d=`M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} L${ix2},${iy2} A${inner},${inner} 0 ${large} 0 ${ix1},${iy1} Z`;
    const click=it.onClick?`onclick="${esc(it.onClick)}" style="cursor:pointer"`:it.filterKey?`onclick="showChartList('${esc(it.filterKey)}','${esc(it.filterVal)}','${esc(it.label)}')" style="cursor:pointer"`:'';
    paths+=`<path d="${d}" fill="${it.color}" ${click}><title>${esc(it.label)}: ${it.value}</title></path>`;
    ang+=sweep;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    ${paths}
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="20" font-weight="900" fill="#0f172a">${total}</text>
    <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="10" fill="#94a3b8">총 건수</text>
  </svg>`;
}

// 트렌드 라인 차트: items=[{label, value}]
function svgTrendLine(items,opts={}){
  if(!items.length)return '<div style="color:var(--tm);font-size:12px;padding:8px 0">데이터 없음</div>';
  const w=320,h=110,padL=28,padB=20,padT=10,padR=10;
  const innerW=w-padL-padR,innerH=h-padT-padB;
  const maxV=Math.max(...items.map(i=>i.value),1);
  const stepX=items.length>1?innerW/(items.length-1):0;
  const pts=items.map((it,i)=>{const x=padL+i*stepX,y=padT+innerH-(it.value/maxV)*innerH;return {x,y,...it};});
  const linePath=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  const areaPath=`${linePath} L${pts[pts.length-1].x},${padT+innerH} L${pts[0].x},${padT+innerH} Z`;
  let s=`<svg width="100%" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;
  s+=`<line x1="${padL}" y1="${padT+innerH}" x2="${w-padR}" y2="${padT+innerH}" stroke="#e2e8f0"/>`;
  s+=`<path d="${areaPath}" fill="#3b82f618"/>`;
  s+=`<path d="${linePath}" fill="none" stroke="#3b82f6" stroke-width="2"/>`;
  pts.forEach(p=>{
    s+=`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#3b82f6" style="cursor:pointer" onclick="showChartList('year','${esc(p.label)}','${esc(p.label)}년')"/>`;
    s+=`<text x="${p.x}" y="${h-4}" text-anchor="middle" font-size="9.5" fill="#94a3b8">${esc(p.label)}</text>`;
    s+=`<text x="${p.x}" y="${p.y-8}" text-anchor="middle" font-size="10" font-weight="700" fill="#0f172a">${p.value}</text>`;
  });
  return s+'</svg>';
}

  const k=kpi(data);

  const allYears=[...new Set(samples.map(s=>s.year))].sort((a,b)=>a-b);

  const yearTabs=`<div class="corp-tabs" style="margin-bottom:8px">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span style="font-size:11px;color:var(--ts);font-weight:700;padding-bottom:8px">📅 연도</span>
      <button class="ct${dy==='all'?' active':''}" onclick="state.dashYear='all';render()">전체</button>
      ${allYears.map(y=>`<button class="ct${String(dy)===String(y)?' active':''}" onclick="state.dashYear='${y}';render()">${y}년</button>`).join('')}
    </div>
  </div>`;

  const corpTabs=`<div class="corp-tabs" style="justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
    <div style="display:flex">${['그룹','브로드밴드'].map(c=>`<button class="ct${dc===c?' active':''}" onclick="state.dashCorp='${c}';render()">${c==='그룹'?'🏢 그룹':'📡 브로드밴드'}</button>`).join('')}</div>
  </div>`;

  const kpiH=[{ico:'📦',bg:'#eff6ff',v:k.total,l:'전체 샘플 수'},{ico:'🔄',bg:'#fff7ed',v:k.inProg,l:'진행 중인 샘플'},{ico:'📅',bg:'#f5f3ff',v:k.thisMonth,l:'이번 달 피드백 예정'},{ico:'⚠️',bg:'#fef2f2',v:k.overdue,l:'기한 초과 건수'}]
    .map(c=>`<div class="kpi-card"><div class="kpi-ico" style="background:${c.bg}">${c.ico}</div><div><div class="kpi-v">${c.v}</div><div class="kpi-l">${c.l}</div></div></div>`).join('');

  // 상태별 도넛
  const statusCounts=STATUSES.map(st=>({label:st,value:data.filter(s=>s.status===st).length,color:STATUS_MAP[st].color,filterKey:'status',filterVal:st}));
  const statusDonut=svgDonut(statusCounts.filter(i=>i.value>0),{size:130});
  const statusLegend=statusCounts.map(it=>`<div class="leg-item" style="cursor:pointer" onclick="showChartList('status','${it.filterVal}','${STATUS_MAP[it.filterVal].icon} ${it.filterVal}')"><div class="leg-dot" style="background:${it.color}"></div>${STATUS_MAP[it.filterVal].icon} ${it.label} (${it.value})</div>`).join('');

  // 사업자 연속성: 작년 대비 올해 신규/유지/이탈 사업자 구분
  const contYears=allYears.slice().sort((a,b)=>a-b);
  const latestYear=contYears.length?contYears[contYears.length-1]:null;
  const prevYear=latestYear!==null?contYears.filter(y=>y<latestYear).pop():null;
  const corpAll=filteredBy(dc,null);
  let continuitySection='';
  if(latestYear!==null&&prevYear!==undefined&&prevYear!==null){
    const opsLatest=new Set(corpAll.filter(s=>s.year===latestYear).map(s=>s.operator));
    const opsPrev=new Set(corpAll.filter(s=>s.year===prevYear).map(s=>s.operator));
    const newOps=[...opsLatest].filter(o=>!opsPrev.has(o));
    const keepOps=[...opsLatest].filter(o=>opsPrev.has(o));
    const churnOps=[...opsPrev].filter(o=>!opsLatest.has(o));
    const contItems=[
      {label:'신규',value:newOps.length,color:'#16a34a',kind:'new'},
      {label:'유지',value:keepOps.length,color:'#3b82f6',kind:'keep'},
      {label:'이탈',value:churnOps.length,color:'#dc2626',kind:'churn'}
    ];
    contItems.forEach(it=>it.onClick=`showContinuityList('${it.kind}')`);
    window._contData={new:newOps,keep:keepOps,churn:churnOps,latestYear,prevYear};
    const contLegend=contItems.map(it=>`<div class="leg-item" style="cursor:pointer" onclick="showContinuityList('${it.kind}')"><div class="leg-dot" style="background:${it.color}"></div>${it.label} (${it.value})</div>`).join('');
    continuitySection=`<div class="chart-card">
      <div class="chart-title">🔁 사업자 연속성 (${prevYear}→${latestYear})</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:16px">
        ${svgDonut(contItems.filter(i=>i.value>0),{size:130})}
        <div class="legend" style="flex-direction:column;align-items:flex-start;margin-top:0">${contLegend}</div>
      </div>
    </div>`;
  }else{
    continuitySection=`<div class="chart-card" style="display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div class="chart-title" style="align-self:flex-start">🔁 사업자 연속성</div>
      <div class="empty" style="padding:20px 0">비교할 연도 데이터가 부족합니다</div>
    </div>`;
  }

  // 사업자별 수량 합계 (상태 구분 없이 quantity 합산, 상위 3개 사업자 색상 강조)
  const opQty={};data.forEach(s=>{opQty[s.operator]=(opQty[s.operator]||0)+(Number(s.quantity)||0);});
  const opSorted=Object.entries(opQty).sort((a,b)=>b[1]-a[1]);
  const TOP_COLOR='#f59e0b',REST_COLOR='#94a3b8';
  const opItems=opSorted.map(([op,qty],i)=>({label:op,value:qty,color:i<3?TOP_COLOR:REST_COLOR,filterKey:'operator',filterVal:op}));
  const opChart=svgHBar(opItems,{barH:22,gap:9});
  const opLegendBar=`<div class="leg-item"><div class="leg-dot" style="background:${TOP_COLOR}"></div>수량 상위 3개 사업자</div><div class="leg-item"><div class="leg-dot" style="background:${REST_COLOR}"></div>그 외 사업자</div>`;

  // 칩셋(그룹) / 제품군·국가(브로드밴드) 바
  const chipMap={};data.filter(s=>s.corporation==='그룹').forEach(s=>{if(s.chip)chipMap[s.chip]=(chipMap[s.chip]||0)+(Number(s.quantity)||0);});
  const chipMax=Math.max(...Object.values(chipMap),0);
  const chipItems=Object.entries(chipMap).map(([c,n])=>({label:c,value:n,color:n===chipMax&&n>0?'#f59e0b':'#8b5cf6',filterKey:'chip',filterVal:c}));

  const pgMap={};data.filter(s=>s.corporation==='브로드밴드').forEach(s=>{if(s.productGroup)pgMap[s.productGroup]=(pgMap[s.productGroup]||0)+(Number(s.quantity)||0);});
  const pgMax=Math.max(...Object.values(pgMap),0);
  const pgItems=Object.entries(pgMap).map(([g,n])=>({label:g,value:n,color:n===pgMax&&n>0?'#f59e0b':'#6d28d9',filterKey:'productGroup',filterVal:g}));

  // 연도별 트렌드 (현재 법인 필터 기준, 연도 필터는 무시하고 전체 연도 추세를 보여줌)
  const trendBase=filteredBy(dc,null);
  const trendItems=allYears.slice().sort((a,b)=>a-b).map(y=>({label:String(y),value:trendBase.filter(s=>s.year===y).length}));

  const sideCharts=[chipItems.length?`<div class="chart-card"><div class="chart-title">🏢 칩셋별 현황 (그룹)</div>${svgHBar(chipItems)}</div>`:'',
    pgItems.length?`<div class="chart-card"><div class="chart-title">📡 제품군별 현황 (브로드밴드)</div>${svgHBar(pgItems)}</div>`:''].filter(Boolean).join('');

  return `${yearTabs}${corpTabs}
    <div class="sec-divider"><span>📊 샘플 운영 현황</span></div>
    <div class="kpi-grid">${kpiH}</div>
    <div class="chart-row-3" style="margin-bottom:12px">
      <div class="chart-card">
        <div class="chart-title">샘플 진행 상태</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:16px">
          ${statusDonut}
          <div class="legend" style="flex-direction:column;align-items:flex-start;margin-top:0">${statusLegend}</div>
        </div>
      </div>
      ${continuitySection}
      <div class="chart-card">
        <div class="chart-title">📈 연도별 샘플 추이 (${dc})</div>
        ${svgTrendLine(trendItems)}
      </div>
    </div>
    <div class="chart-row" style="margin-bottom:12px">
      <div class="chart-card"><div class="chart-title">사업자별 샘플 수량</div><div class="chart-scroll" style="max-height:280px;overflow-y:auto;padding-right:4px">${opChart}</div><div class="legend">${opLegendBar}</div></div>
      ${sideCharts?`<div style="display:flex;flex-direction:column;gap:12px">${sideCharts}</div>`:'<div></div>'}
    </div>
    ${analyticsSection(dc,data,allYears)}`;
}

// ── 심층 분석 차트 헬퍼 ───────────────────────────────────
// 100% 누적 가로 바(전환율 시각화). segs=[{label,value,color}], 클릭 시 showChartList
function svgPctBar(rows,opts={}){
  // rows=[{label, segs:[{key,val,color,name}], onSeg(seg)->onclick string}]
  if(!rows.length)return '<div style="color:var(--tm);font-size:12px;padding:8px 0">데이터 없음</div>';
  const barH=opts.barH||24,gap=opts.gap||10,labelW=opts.labelW||96,barW=230,totalW=labelW+barW+44;
  const h=rows.length*(barH+gap)+gap;
  let s=`<svg width="100%" height="${h}" viewBox="0 0 ${totalW} ${h}" preserveAspectRatio="xMinYMin meet" xmlns="http://www.w3.org/2000/svg">`;
  rows.forEach((row,i)=>{
    const y=gap+i*(barH+gap);
    const total=row.segs.reduce((a,sg)=>a+sg.val,0)||1;
    s+=`<text x="${labelW-6}" y="${y+barH/2+4}" text-anchor="end" font-size="11" fill="#4a5568">${esc(row.label)}</text>`;
    s+=`<rect x="${labelW}" y="${y}" width="${barW}" height="${barH}" fill="#f0f4f8" rx="3"/>`;
    let x=labelW;
    row.segs.forEach(sg=>{
      if(!sg.val)return;const w=(sg.val/total)*barW;
      const click=row.onSeg?`style="cursor:pointer" onclick="${row.onSeg(sg)}"`:'';
      s+=`<rect x="${x.toFixed(1)}" y="${y}" width="${w.toFixed(1)}" height="${barH}" fill="${sg.color}" ${click}><title>${esc(sg.name)}: ${sg.val}</title></rect>`;
      if(w>20)s+=`<text x="${(x+w/2).toFixed(1)}" y="${y+barH/2+4}" text-anchor="middle" font-size="10" fill="#fff" font-weight="700" style="pointer-events:none">${sg.val}</text>`;
      x+=w;
    });
    s+=`<text x="${labelW+barW+8}" y="${y+barH/2+4}" font-size="11" fill="#94a3b8">${total}</text>`;
  });
  return s+'</svg>';
}

// 다중 시리즈 라인(연도별 수주율 % 등). series=[{name,color,pts:[{label,value}]}]
function svgMultiLine(series,opts={}){
  const labels=opts.labels||[];
  if(!series.length||!labels.length)return '<div style="color:var(--tm);font-size:12px;padding:8px 0">데이터 없음</div>';
  const w=opts.w||340,h=opts.h||150,padL=34,padB=22,padT=14,padR=12;
  const innerW=w-padL-padR,innerH=h-padT-padB;
  const maxV=opts.maxV||Math.max(...series.flatMap(se=>se.pts.map(p=>p.value)),1);
  const stepX=labels.length>1?innerW/(labels.length-1):0;
  let s=`<svg width="100%" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;
  // y축 격자(0,50,100 또는 maxV기준 3분할)
  [0,0.5,1].forEach(f=>{const gy=padT+innerH-f*innerH;s+=`<line x1="${padL}" y1="${gy}" x2="${w-padR}" y2="${gy}" stroke="#eef2f6"/>`;s+=`<text x="${padL-5}" y="${gy+3}" text-anchor="end" font-size="8.5" fill="#94a3b8">${Math.round(f*maxV)}${opts.unit||''}</text>`;});
  labels.forEach((lb,i)=>{const x=padL+i*stepX;s+=`<text x="${x}" y="${h-6}" text-anchor="middle" font-size="9.5" fill="#94a3b8">${esc(lb)}</text>`;});
  series.forEach(se=>{
    const pts=se.pts.map((p,i)=>({x:padL+i*stepX,y:padT+innerH-(p.value/maxV)*innerH,...p}));
    const line=pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
    s+=`<path d="${line}" fill="none" stroke="${se.color}" stroke-width="2.2"/>`;
    pts.forEach(p=>{s+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="${se.color}"><title>${esc(se.name)} ${esc(p.label)}: ${p.value}${opts.unit||''}</title></circle>`;s+=`<text x="${p.x.toFixed(1)}" y="${(p.y-7).toFixed(1)}" text-anchor="middle" font-size="9" font-weight="700" fill="${se.color}">${p.value}${opts.unit||''}</text>`;});
  });
  return s+'</svg>';
}

// ── 심층 분석 페이지 ──────────────────────────────────────
// 실제 엑셀의 수주여부/회수여부/부서/국가 차원을 분석. 그룹=칩셋·제조사, 브로드밴드=국가·제품군
// ── 수주·회수 심층 분석 섹션 (현황 대시보드에 통합) ──
// dc: 법인, data: 대시보드에서 법인+연도 필터링된 데이터, allYears: 전체 연도
function analyticsSection(dc,data,allYears){
  // 수주여부 카테고리 색상(실제 데이터: 프로젝트 수주/영업 활동 중/미수주/RFP 중/제출 전 등)
  const ORDER_COLORS={'프로젝트 수주':'#16a34a','영업 활동 중':'#3b82f6','RFP 중':'#8b5cf6','미수주':'#dc2626','제출 전':'#94a3b8','검토중':'#f59e0b','미결정':'#cbd5e1','수주':'#16a34a','-':'#cbd5e1'};
  const oc=v=>ORDER_COLORS[v]||'#64748b';
  const orderVals=[...new Set(data.map(s=>String(s.isOrdered||'-')))].sort((a,b)=>{const ord=['프로젝트 수주','수주','영업 활동 중','RFP 중','검토중','미결정','제출 전','미수주','-'];return (ord.indexOf(a)+1||99)-(ord.indexOf(b)+1||99);});

  // ── KPI: 수주 성과 ──
  const won=data.filter(s=>String(s.isOrdered)==='프로젝트 수주'||String(s.isOrdered)==='수주').length;
  const active=data.filter(s=>String(s.isOrdered)==='영업 활동 중'||String(s.isOrdered)==='RFP 중'||String(s.isOrdered)==='검토중').length;
  const lost=data.filter(s=>String(s.isOrdered)==='미수주').length;
  const decided=won+lost; // 결정된 건(수주+미수주) 기준 전환율
  const winRate=decided?Math.round(won/decided*100):0;
  const totalQty=data.reduce((a,s)=>a+(Number(s.quantity)||0),0);
  const retQty=data.reduce((a,s)=>a+(Number(s.returnQuantity)||0),0);
  const recoverableLost=data.filter(s=>String(s.isReturned)==='회수 불가'||String(s.isReturned)==='미회수').length;
  const kpis=[
    {ico:'🏆',bg:'#f0fdf4',v:won,l:'프로젝트 수주 건수'},
    {ico:'🎯',bg:'#f0fdf4',v:winRate+'%',l:'수주 전환율 (수주/결정완료)'},
    {ico:'🔥',bg:'#eff6ff',v:active,l:'영업 진행 중 (활동·RFP)'},
    {ico:'📦',bg:'#fff7ed',v:`${retQty}/${totalQty}`,l:'회수/발송 수량 (대)'},
  ].map(c=>`<div class="kpi-card"><div class="kpi-ico" style="background:${c.bg}">${c.ico}</div><div><div class="kpi-v">${c.v}</div><div class="kpi-l">${c.l}</div></div></div>`).join('');

  // ── 1) 수주여부 도넛 ──
  const orderDonut=orderVals.map(v=>({label:v,value:data.filter(s=>String(s.isOrdered||'-')===v).length,color:oc(v),filterKey:'isOrdered',filterVal:v})).filter(i=>i.value>0);
  const orderLegend=orderDonut.map(it=>`<div class="leg-item" style="cursor:pointer" onclick="showChartList('isOrdered','${esc(it.label)}','수주: ${esc(it.label)}')"><div class="leg-dot" style="background:${it.color}"></div>${esc(it.label)} (${it.value})</div>`).join('');

  // ── 2) 부서별 수주여부 100% 누적 바(부서 성과) ──
  const depts=[...new Set(data.map(s=>s.salesDept))].filter(Boolean);
  const deptRows=depts.map(d=>{
    const sub=data.filter(s=>s.salesDept===d);
    return {label:d, _n:sub.length,
      segs:orderVals.map(v=>({key:v,name:v,val:sub.filter(s=>String(s.isOrdered||'-')===v).length,color:oc(v)})).filter(sg=>sg.val>0),
      onSeg:sg=>`showChartList('salesDept','${esc(d)}','${esc(d)}','isOrdered','${esc(sg.key)}')`};
  }).sort((a,b)=>b._n-a._n);
  const deptBar=svgPctBar(deptRows,{labelW:96});

  // ── 3) 회수 현황 도넛 ──
  const RET_COLORS={'회수 완료':'#16a34a','회수 예정':'#f59e0b','미회수':'#3b82f6','회수 불가':'#dc2626','제출 전':'#94a3b8','일부 수량(2대) 회수 완료':'#84cc16','일부 수량(10대) 회수 완료':'#84cc16'};
  const rc=v=>RET_COLORS[v]||'#64748b';
  const retVals=[...new Set(data.map(s=>String(s.isReturned||'-')))].filter(v=>v&&v!=='-');
  const retDonut=retVals.map(v=>({label:v,value:data.filter(s=>String(s.isReturned)===v).length,color:rc(v),filterKey:'isReturned',filterVal:v})).filter(i=>i.value>0).sort((a,b)=>b.value-a.value);
  const retLegend=retDonut.map(it=>`<div class="leg-item" style="cursor:pointer" onclick="showChartList('isReturned','${esc(it.label)}','회수: ${esc(it.label)}')"><div class="leg-dot" style="background:${it.color}"></div>${esc(it.label)} (${it.value})</div>`).join('');

  // ── 4) 연도별 수주 전환율 추이(라인) — 연도 필터와 무관하게 전체 추세 ──
  const trendBase=filteredBy(dc,null);
  const winSeries=[{name:'수주 전환율',color:'#16a34a',pts:allYears.map(y=>{const sub=trendBase.filter(s=>s.year===y);const w=sub.filter(s=>String(s.isOrdered)==='프로젝트 수주'||String(s.isOrdered)==='수주').length;const l=sub.filter(s=>String(s.isOrdered)==='미수주').length;const dec=w+l;return {label:String(y),value:dec?Math.round(w/dec*100):0};})}];
  const winTrend=svgMultiLine(winSeries,{labels:allYears.map(String),maxV:100,unit:'%',w:340,h:150});

  // ── 5) 차원별 분포(그룹=칩셋·제조사 / 브로드밴드=국가·제품군), 수주 강조 ──
  let dim1Title,dim1Bar,dim2Title,dim2Bar;
  if(dc==='그룹'){
    const chipQty={};data.forEach(s=>{if(s.chip)chipQty[s.chip]=(chipQty[s.chip]||0)+(Number(s.quantity)||0);});
    const cMax=Math.max(...Object.values(chipQty),0);
    dim1Title='🔌 칩셋별 발송 수량';
    dim1Bar=svgHBar(Object.entries(chipQty).sort((a,b)=>b[1]-a[1]).map(([c,n])=>({label:c,value:n,color:n===cMax&&n>0?'#f59e0b':'#8b5cf6',filterKey:'chip',filterVal:c})),{labelW:120});
    const mkQty={};data.forEach(s=>{if(s.manufacturer)mkQty[s.manufacturer]=(mkQty[s.manufacturer]||0)+(Number(s.quantity)||0);});
    const mMax=Math.max(...Object.values(mkQty),0);
    dim2Title='🏭 제조사별 발송 수량';
    dim2Bar=svgHBar(Object.entries(mkQty).sort((a,b)=>b[1]-a[1]).map(([c,n])=>({label:c,value:n,color:n===mMax&&n>0?'#f59e0b':'#3b82f6',filterKey:'manufacturer',filterVal:c})),{labelW:90});
  }else{
    const ctMap={};data.forEach(s=>{const k=(s.country||'').trim();if(k)ctMap[k]=(ctMap[k]||0)+1;});
    const ctMax=Math.max(...Object.values(ctMap),0);
    dim1Title='🌍 국가별 샘플 건수 (상위 12)';
    dim1Bar=svgHBar(Object.entries(ctMap).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([c,n])=>({label:c,value:n,color:n===ctMax&&n>0?'#f59e0b':'#6d28d9',filterKey:'country',filterVal:c})),{labelW:110});
    const pgQty={};data.forEach(s=>{const k=(s.productGroup||'').trim().toUpperCase();if(k)pgQty[k]=(pgQty[k]||0)+(Number(s.quantity)||0);});
    const pMax=Math.max(...Object.values(pgQty),0);
    dim2Title='📡 제품군별 발송 수량';
    dim2Bar=svgHBar(Object.entries(pgQty).sort((a,b)=>b[1]-a[1]).map(([c,n])=>({label:c,value:n,color:n===pMax&&n>0?'#f59e0b':'#3b82f6'})),{labelW:70});

  // ── 6) 사업자별 수주여부 누적(상위 10 사업자) ──

  const opBar=svgPctBar(opRows,{labelW:110});

  const orderLegendShared=orderVals.map(v=>`<div class="leg-item"><div class="leg-dot" style="background:${oc(v)}"></div>${esc(v)}</div>`).join('');

  return `
    <div class="sec-divider"><span>📈 수주 · 회수 심층 분석</span></div>
    <div class="kpi-grid">${kpis}</div>
    <div class="chart-row-3" style="margin-bottom:12px">
      <div class="chart-card">
        <div class="chart-title">🎯 수주여부 분포</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:14px">
          ${svgDonut(orderDonut,{size:130})}
          <div class="legend" style="flex-direction:column;align-items:flex-start;margin-top:0">${orderLegend}</div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">♻️ 회수 현황</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:14px">
          ${svgDonut(retDonut,{size:130})}
          <div class="legend" style="flex-direction:column;align-items:flex-start;margin-top:0">${retLegend}</div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">📈 연도별 수주 전환율 (%)</div>
        ${winTrend}
        <div style="font-size:10.5px;color:var(--tm);margin-top:4px">* 전환율 = 프로젝트 수주 / (수주+미수주). 미결정 건 제외 · 전체 연도 기준</div>
      </div>

    <div class="chart-row" style="margin-bottom:12px">
      <div class="chart-card">
        <div class="chart-title">🏢 부서별 수주 성과 (건수 누적)</div>
        <div class="chart-scroll" style="max-height:300px;overflow-y:auto;padding-right:4px">${deptBar}</div>
        <div class="legend">${orderLegendShared}</div>
      </div>
      <div class="chart-card">

}

function showContinuityList(kind){
  const cd=window._contData;if(!cd)return;
  const opsSet=kind==='new'?cd.new:kind==='keep'?cd.keep:cd.churn;
  const labelMap={new:`신규 사업자 (${cd.prevYear}→${cd.latestYear})`,keep:`유지 사업자 (${cd.prevYear}, ${cd.latestYear} 모두 진행)`,churn:`이탈 사업자 (${cd.prevYear}년만 진행)`};
  // 이탈 사업자는 이전 연도 데이터를, 신규/유지는 최신 연도 데이터를 기준으로 보여줌
  const targetYear=kind==='churn'?cd.prevYear:cd.latestYear;
  let data=filteredBy(state.dashCorp,null).filter(s=>s.year===targetYear&&opsSet.includes(s.operator));
  state.listPanelData={label:labelMap[kind],items:data};
  state.panelMode='list';
  state.panelOpen=true;
  render();
}
function showChartList(filterKey,filterVal,label,extraKey,extraVal){
  const corp=state.dashCorp;
  let data=filteredBy(corp,null);
  if(state.dashYear!=='all')data=data.filter(s=>String(s.year).trim()===String(state.dashYear).trim());
  if(filterKey)data=data.filter(s=>String(s[filterKey])===String(filterVal));
  if(extraKey)data=data.filter(s=>String(s[extraKey])===String(extraVal));
  state.listPanelData={label,items:data};
  state.panelMode='list';
  state.panelOpen=true;
  render();
}

function buildMasterRows(data,cols){
  return data.map(s=>{
    const sel=state.selectedRows.has(s.id);
    const cells=cols.map(c=>{
      const isEditing=state.editCell&&state.editCell.id===s.id&&state.editCell.key===c.k;
      if(isEditing){
        let input;
        if(c.type==='select'){
          input=`<select class="cell-edit" id="ce_${s.id}_${c.k}" onclick="event.stopPropagation()" onblur="commitCellEdit(${s.id},'${c.k}')" onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape')cancelCellEdit();" autofocus>${c.opts.map(o=>`<option value="${esc(o)}" ${s[c.k]===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`;
        }else{
          const itype=c.type==='number'?'number':c.type==='date'?'date':'text';
          input=`<input class="cell-edit" type="${itype}" id="ce_${s.id}_${c.k}" value="${esc(s[c.k]??'')}" onclick="event.stopPropagation()" onblur="commitCellEdit(${s.id},'${c.k}')" onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape')cancelCellEdit();">`;
        }
        return `<td style="padding:2px" onclick="event.stopPropagation()">${input}</td>`;
      }
      let v=s[c.k]??'';
      if(c.k==='status'){
        v=badge(s.status);
        const dl=getDelays(s);
        if(dl.length){
          v+=dl.map(d=>`<span class="badge b-delay" style="margin-left:4px" title="${d.date||''} 기준 ${d.days}일 초과"><span class="delay-dot"></span>${d.label} ${d.days}일</span>`).join('');
        }
      }
      else if(c.k==='feedbackDate')v=`<span style="font-size:11px">${s.feedbackDate||'-'}</span>`;
      else v=c.tr?`<span class="td-tr" title="${esc(v)}">${esc(v)||'-'}</span>`:esc(v)||'-';
      return `<td class="td-editable" onclick="event.stopPropagation();startCellEdit(${s.id},'${c.k}')">${v}</td>`;
    }).join('');
    const detailBtn=`<td style="text-align:center" onclick="event.stopPropagation();openPanel(${s.id})"><button style="background:#1e3a5f;color:#fff;border:none;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;white-space:nowrap">📋 상세</button></td>`;
    const delayCls=isDelayed(s)?' row-delayed':'';
    return `<tr class="${sel?'row-sel':''}${delayCls}" style="cursor:pointer" onclick="openPanel(${s.id})"><td class="chk-c" onclick="event.stopPropagation()"><input type="checkbox" ${sel?'checked':''} onchange="toggleRow(${s.id},this.checked)"></td>${detailBtn}${cells}</tr>`;
  }).join('');
}
function getMasterFilteredData(){
  const corp=state.masterCorp;
  const cols=masterCols(corp);
  let data=filteredBy(corp,state.statusFilter);
  const q=(state.masterSearch||'').trim().toLowerCase();
  if(q)data=data.filter(s=>cols.some(c=>String(s[c.k]??'').toLowerCase().includes(q)));
  if(state.delayOnly)data=data.filter(s=>isDelayed(s));
  return{data,cols};
}
// 현재 법인의 지연 건수 집계 (알림 바용)
function getDelaySummary(){
  const data=filteredBy(state.masterCorp,null);
  let prep=0,fb=0;
  data.forEach(s=>{getDelays(s).forEach(d=>{if(d.type==='prep')prep++;else if(d.type==='fb')fb++;});});
  return{prep,fb,total:prep+fb};
}
function buildAlertBar(){
  const sum=getDelaySummary();
  if(sum.total===0)return '';
  const parts=[];
  if(sum.prep>0)parts.push(`준비기한 초과 <b>${sum.prep}건</b>`);
  if(sum.fb>0)parts.push(`피드백기한 초과 <b>${sum.fb}건</b>`);
  const btnLabel=state.delayOnly?'전체 보기':'지연만 보기';
  return `<div class="alert-bar">
    <span class="ab-icon">🔔</span>
    <span class="ab-title">기한 초과 알림</span>
    <span class="ab-chip">${sum.total}건</span>
    <span class="ab-sub">${parts.join(' · ')}</span>
    <button class="ab-btn" onclick="state.delayOnly=${!state.delayOnly};render()">${btnLabel}</button>
  </div>`;
}

function buildBoardTable(){
  const corp=state.boardCorp;
  const data=filteredBy(corp,null);
  const firstLabel=corp==='그룹'?'샘플 요청':'모델명';
  const firstKey=corp==='그룹'?'requestName':'modelName';
  const cols=[{k:firstKey,l:firstLabel},{k:'meetingHW',l:'회의 내용'},{k:'dueDate',l:'준비 기한'},{k:'status',l:'진행 상태'},{k:'feedbackDate',l:'피드백 예정일자'},{k:'monitoringFeedback',l:'★사업자 모니터링'},{k:'requester',l:'요청자'},{k:'keyContacts',l:'주요 관련자'}];
  const thead=`<tr>`+cols.map(c=>`<th>${c.l}</th>`).join('')+'</tr>';
  const rows=data.map(s=>{
    const done=s.status==='샘플 회수';
    const cells=cols.map(c=>{
      let v;
      if(c.k==='status')v=badge(s.status);
      else if(c.k==='dueDate')v=relDate(s.dueDate,done);
      else if(c.k==='feedbackDate')v=`<span style="font-size:11px">${s.feedbackDate||'-'}</span>`;
      else if(c.k==='requester')v=`<div class="av-row">${avatar(s.requester)}<span>${esc(s.requester)}</span></div>`;
      else if(c.k===firstKey)v=`<span style="font-weight:700;font-size:12px">${esc(s[c.k])}</span>`;
      else v=`<span class="td-tr" style="max-width:130px" title="${esc(s[c.k]||'')}">${esc(s[c.k])||'-'}</span>`;
      return `<td>${v}</td>`;
    }).join('');
    return `<tr onclick="openPanel(${s.id})">${cells}</tr>`;
  }).join('');
  return `<div class="tw"><div class="tscroll"><table><thead>${thead}</thead><tbody>${rows}</tbody></table></div></div>`;
}

// 상단 스크롤바 ↔ 테이블 가로 스크롤 동기화
function syncMasterTopScroll(){
  const top=document.getElementById('masterTopScroll');
  const bottom=document.getElementById('masterScroll');
  const table=document.getElementById('masterTable');
  const inner=document.getElementById('masterTopScrollInner');
  if(!top||!bottom||!table||!inner)return;
  // 상단 더미 바 너비 = 실제 테이블 너비 (스크롤 길이 맞춤)
  inner.style.width=table.scrollWidth+'px';
  // 양방향 동기화 (한쪽이 스크롤되면 다른 쪽도 이동, 무한루프 방지)
  let lock=false;
  top.onscroll=()=>{if(lock)return;lock=true;bottom.scrollLeft=top.scrollLeft;lock=false;};
  bottom.onscroll=()=>{if(lock)return;lock=true;top.scrollLeft=bottom.scrollLeft;lock=false;};
}

// ── 날짜 4가지 형태 변환 (2단계 MD Step3) ─────────────────
function parseExcelDate(value){
  if(!value||String(value).trim()==='')return'';
  if(typeof value==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(value.trim()))return value.trim();
  if(value instanceof Date&&!isNaN(value.getTime()))return value.toISOString().slice(0,10);
  if(typeof value==='number'&&value>1000){try{const dt=XLSX.SSF.parse_date_code(value);if(dt)return`${dt.y}-${String(dt.m).padStart(2,'0')}-${String(dt.d).padStart(2,'0')}`;}catch(e){}}
  if(typeof value==='string'){const p=new Date(value);if(!isNaN(p.getTime())){const y=p.getFullYear(),m=String(p.getMonth()+1).padStart(2,'0'),d=String(p.getDate()).padStart(2,'0');return`${y}-${m}-${d}`;}}
  return String(value);
}

// ── 행 파싱 + 검증 (2단계 MD Step4-6) ────────────────────
// 시그니처: parseRows(dataRows, headerRow, corp) — 호출자가 2행 헤더 분리 후 전달
function parseRows(dataRows, headerRow, corp){
  const valid=[],errors=[],warnings=[];

  // GROUP_MAP / BB_MAP — 엑셀 헤더명 → JSON 필드명
  const GROUP_MAP={'영업부서':'salesDept','영업 담당자':'salesManager','사업자':'operator','샘플 프로젝트명':'projectName','년도':'year','OS':'os','제조사':'manufacturer','Chip':'chip','수량':'quantity','진행 상태':'status','피드백 예정일자':'feedbackDate','사업자 피드백 및 발송 이후 진행사항':'operatorFeedback','회수여부':'isReturned','회수 불가사유':'returnImpossibleReason','수주여부':'isOrdered','회수 수량':'returnQuantity'};
  const BB_MAP={'영업부서':'salesDept','영업 담당자':'salesManager','사업자':'operator','모델명':'modelName','년도':'year','제품군':'productGroup','국가':'country','용도':'purpose','수량':'quantity','진행 상태':'status','피드백 예정일자':'feedbackDate','사업자 피드백 및 발송 이후 진행사항':'operatorFeedback','회수여부':'isReturned','회수 불가사유':'returnImpossibleReason','수주여부':'isOrdered','회수 수량':'returnQuantity'};
  const colMap=corp==='그룹'?GROUP_MAP:BB_MAP;

  const GROUP_REQ=['영업부서','영업 담당자','사업자','샘플 프로젝트명','년도','OS','제조사','Chip','수량','진행 상태'];
  const BB_REQ=['영업부서','영업 담당자','사업자','모델명','년도','제품군','국가','용도','수량','진행 상태'];
  const requiredCols=corp==='그룹'?GROUP_REQ:BB_REQ;

  // 헤더 정규화 (null/undefined 제외)
  const hdr=headerRow.map(h=>String(h??'').trim());

  dataRows.forEach((row,i)=>{
    // 완전 빈 행 건너뜀
    if(!row||row.every(cell=>cell===''||cell==null))return;
    const excelRowNum=i+3; // 1행그룹헤더+2행컬럼헤더+1

    // 헤더 기준으로 엑셀행 → record 객체 변환
    const record={};
    hdr.forEach((col,idx)=>{if(col)record[col]=row[idx]??'';});

    let hasError=false;

    // ① 필수 컬럼 누락 체크
    requiredCols.forEach(col=>{
      if(!record[col]||String(record[col]).trim()===''){
        errors.push({row:excelRowNum,col,type:'필수 필드 누락'});hasError=true;
      }
    });

    // ② 진행 상태 허용값 체크 (errors가 아닌 warnings에 추가)
    const rawStatus=String(record['진행 상태']||'').trim();
    if(rawStatus&&!STATUSES.includes(rawStatus)){
      warnings.push({row:excelRowNum,col:'진행 상태',type:`"${rawStatus}" → "샘플 요청" 대체`});
      record['진행 상태']='샘플 요청';
    }

    // ③ 날짜 변환 (피드백 예정일자)
    if(record['피드백 예정일자']&&String(record['피드백 예정일자']).trim()!==''){
      const converted=parseExcelDate(record['피드백 예정일자']);
      if(!/^\d{4}-\d{2}-\d{2}$/.test(converted)){
        errors.push({row:excelRowNum,col:'피드백 예정일자',type:'날짜 형식 오류'});
        hasError=true;record['피드백 예정일자']='';
      }else{record['피드백 예정일자']=converted;}
    }

    if(!hasError){
      // ④ JSON 필드명으로 매핑 + 기본값 보완
      const mapped={id:nextId()+valid.length,corporation:corp,requestName:'',meetingHW:'',meetingSW:'',meetingStructure:'',dueDate:'',monitoringStart:'',monitoringEnd:'',monitoringFeedback:'',requester:'',keyContacts:'',attachment:''};
      Object.entries(colMap).forEach(([excelKey,jsonKey])=>{mapped[jsonKey]=record[excelKey]??'';});
      mapped.year=normalizeYear(mapped.year);
      if(mapped.quantity)mapped.quantity=parseInt(mapped.quantity)||1;
      if(mapped.returnQuantity)mapped.returnQuantity=parseInt(mapped.returnQuantity)||0;
      if(!mapped.status)mapped.status='샘플 요청';
      valid.push(mapped);
    }
  });
  return{valid,errors,warnings};
}

// ── 파일 선택 → 파싱 (2단계 MD Step2) ────────────────────
function handleImportFile(e){
  const file=e.target.files[0];if(!file)return;e.target.value='';
  const ext=file.name.split('.').pop().toLowerCase();

  if(ext==='csv'){
    // CSV: 2행 헤더 구조 지원 (1행=그룹헤더, 2행=컬럼명, 3행~=데이터)
    const r=new FileReader();
    r.onload=ev=>{
      const raw=ev.target.result.split('\n').map(l=>l.split(',').map(v=>v.trim().replace(/^"|"$/g,'')));
      if(raw.length<3){showToast('데이터가 부족합니다 (최소 3행 필요)','error');return;}
      const headerRow=raw[1];
      const dataRows=raw.slice(2);
      const corp=state.masterCorp;
      const{valid,errors,warnings}=parseRows(dataRows,headerRow,corp);
      showImportModal(valid,errors,warnings);
    };
    r.readAsText(file,'utf-8');
    return;
  }

  if(ext!=='xlsx'&&ext!=='xls'){showToast('xlsx, xls, csv 파일만 지원합니다','error');return;}
  if(window._xlsxUnavailable||typeof XLSX==='undefined'){showToast('SheetJS 로드 실패 — CSV 파일을 사용하거나 인터넷 연결 후 재시도하세요','error',5000);return;}

  const r=new FileReader();
  r.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      let allValid=[],allErrors=[],allWarnings=[];
      const SHEET_CORP={'그룹':'그룹','브로드밴드':'브로드밴드'};

      wb.SheetNames.forEach(sn=>{
        const corp=SHEET_CORP[sn];
        if(!corp){allWarnings.push({row:'-',col:sn,type:'알 수 없는 시트명 — 건너뜀'});return;}
        const ws=wb.Sheets[sn];
        // 2단계 MD 핵심: header:1 + defval:'' + raw:true (시리얼 숫자 보존 → parseExcelDate 변환)
        const rawData=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:true});
        if(rawData.length<3)return; // 헤더 2행 + 데이터 1행 미만

        const headerRow=rawData[1];       // 2번째 행 = 실제 컬럼명
        const dataRows=rawData.slice(2);  // 3번째 행~ = 데이터

        const{valid,errors,warnings}=parseRows(dataRows,headerRow,corp);
        allValid=allValid.concat(valid);
        allErrors=allErrors.concat(errors);
        allWarnings=allWarnings.concat(warnings);
      });
      showImportModal(allValid,allErrors,allWarnings);
    }catch(err){showToast('파싱 오류: '+err.message,'error');}
  };
  r.readAsArrayBuffer(file);
}

// ── Import 확정 — 실제 state 반영 (2단계 MD Step5) ────────
function applyImport(){
  const rows=_pendingImportRows;
  if(!rows||!rows.length){showToast('Import할 데이터가 없습니다','warning');return;}
  const mode=document.querySelector('input[name="im"]:checked')?.value||'append';
  if(mode==='replace'){
    // import된 법인만 교체 — 나머지 법인 데이터는 그대로 유지
    const importedCorps=[...new Set(rows.map(r=>r.corporation))];
    const kept=samples.filter(s=>!importedCorps.includes(s.corporation));
    const base=kept.length?Math.max(...kept.map(s=>s.id))+1:1;
    rows.forEach((r,i)=>{r.id=base+i;});
    samples=[...kept,...rows];
  } else {
    const base=nextId();
    rows.forEach((r,i)=>{r.id=base+i;});
    samples=[...samples,...rows];
  }
  _pendingImportRows=[];
  saveSamples();_sbReplaceAll(samples);closeModal();render();
  showToast(`Import 완료: ${rows.length}건 ${mode==='replace'?'전체 교체':'추가'}됨`,'success');
}

function doExport(){
  const mode=document.querySelector('input[name="em"]:checked')?.value||'all';
  let gData,bbData;
  if(mode==='all'){gData=samples.filter(s=>s.corporation==='그룹');bbData=samples.filter(s=>s.corporation==='브로드밴드');}
  else if(mode==='corp'){gData=state.masterCorp==='그룹'?filteredBy('그룹',null):[];bbData=state.masterCorp==='브로드밴드'?filteredBy('브로드밴드',null):[];}
  else if(mode==='filtered'){gData=filteredBy('그룹',state.statusFilter);bbData=filteredBy('브로드밴드',state.statusFilter);}
  else{gData=samples.filter(s=>s.corporation==='그룹'&&state.selectedRows.has(s.id));bbData=samples.filter(s=>s.corporation==='브로드밴드'&&state.selectedRows.has(s.id));}

  const xlsxAvail=!window._xlsxUnavailable&&typeof XLSX!=='undefined';
  const dateStr=TODAY.toISOString().slice(0,10).replace(/-/g,'');

  if(xlsxAvail){
    // ── SheetJS 방식: aoa_to_sheet + !merges (2단계 MD 준수) ──
    const wb=XLSX.utils.book_new();

    function buildXlsxSheet(data,colMap){
      const keys=colMap.map(c=>c.key);
      const headers=colMap.map(c=>c.excel);
      // 1행: 그룹 헤더 (병합 표시용 — !merges로 실제 병합)
      const row0=['기본 정보',...Array(8).fill(''),'영업 확인 사항',...Array(6).fill('')];
      // 2행: 실제 컬럼명
      const row1=headers;
      // 3행~: 데이터
      const dataRows=data.map(s=>keys.map(k=>String(s[k]??'')));
      const aoa=[row0,row1,...dataRows];
      const ws=XLSX.utils.aoa_to_sheet(aoa);
      // 병합 셀: 기본 정보 A1:I1, 영업 확인 사항 J1:P1
      ws['!merges']=[
        {s:{r:0,c:0},e:{r:0,c:8}},
        {s:{r:0,c:9},e:{r:0,c:15}},
      ];
      // 컬럼 너비 설정
      ws['!cols']=colMap.map(c=>({wch:Math.max(c.excel.length+2,10)}));
      return ws;
    }

    if(gData.length)XLSX.utils.book_append_sheet(wb,buildXlsxSheet(gData,COL_MAP_G),'그룹');
    if(bbData.length)XLSX.utils.book_append_sheet(wb,buildXlsxSheet(bbData,COL_MAP_BB),'브로드밴드');
    if(!gData.length&&!bbData.length){showToast('Export할 데이터가 없습니다','warning');return;}

    XLSX.writeFile(wb,`그룹제안샘플현황_${dateStr}.xlsx`);
    closeModal();
    showToast(`Export 완료 (xlsx): 그룹 ${gData.length}건 · 브로드밴드 ${bbData.length}건`,'success');
  } else {
    // ── Excel XML fallback (SheetJS 없을 때) ──
    const xe=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    function buildXmlSheet(data,colMap){
      const headers=colMap.map(c=>c.excel);
      let t=`<Table>\n<Row><Cell ss:MergeAcross="8" ss:StyleID="s0"><Data ss:Type="String">기본 정보</Data></Cell><Cell ss:MergeAcross="6" ss:StyleID="s0"><Data ss:Type="String">영업 확인 사항</Data></Cell></Row>\n`;
      t+=`<Row>${headers.map(h=>`<Cell ss:StyleID="s1"><Data ss:Type="String">${xe(h)}</Data></Cell>`).join('')}</Row>\n`;
      data.forEach(s=>{t+=`<Row>${colMap.map(c=>`<Cell ss:StyleID="s2"><Data ss:Type="String">${xe(s[c.key])}</Data></Cell>`).join('')}</Row>\n`;});
      return t+'</Table>';
    }
    let xml=`<?xml version="1.0" encoding="UTF-8"?>\n<?mso-application progid="Excel.Sheet"?>\n<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n<Styles>\n<Style ss:ID="s0"><Font ss:Bold="1" ss:Color="#FFFFFF"/><Interior ss:Color="#0d2240" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/></Style>\n<Style ss:ID="s1"><Font ss:Bold="1" ss:Color="#FFFFFF"/><Interior ss:Color="#1e3a5f" ss:Pattern="Solid"/></Style>\n<Style ss:ID="s2"><Borders><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#e2e8f0"/></Borders></Style>\n</Styles>\n`;
    if(gData.length)xml+=`<Worksheet ss:Name="그룹">\n${buildXmlSheet(gData,COL_MAP_G)}\n</Worksheet>\n`;
    if(bbData.length)xml+=`<Worksheet ss:Name="브로드밴드">\n${buildXmlSheet(bbData,COL_MAP_BB)}\n</Worksheet>\n`;
    xml+='</Workbook>';
    const blob=new Blob(['﻿'+xml],{type:'application/vnd.ms-excel;charset=utf-8'});
    const url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download=`그룹제안샘플현황_${dateStr}.xls`;a.click();
    URL.revokeObjectURL(url);closeModal();
    showToast(`Export 완료 (XML fallback): 그룹 ${gData.length}건 · 브로드밴드 ${bbData.length}건`,'warning');
  }
}

//  로그인 / 회원가입  (회사 이메일 도메인만 허용)
// ════════════════════════════════════════════════════════════════
const ALLOWED_DOMAINS = ["kaongroup.com", "kaonbroadband.com"];
let _authMode = 'login'; // 'login' | 'signup'

function _emailDomainOk(email){
  const at = String(email).toLowerCase().split('@')[1] || '';
  return ALLOWED_DOMAINS.includes(at);
}

function renderAuthGate(){
  const g=document.getElementById('authGate');
  const isLogin=_authMode==='login';
  g.innerHTML=`
    <div class="auth-card">
      <div class="auth-logo">🔐 샘플 운영 관리 시스템</div>
      <div class="auth-sub">회사 계정으로 로그인하세요</div>
      <div class="auth-tabs">
        <button class="auth-tab ${isLogin?'active':''}" onclick="_switchAuth('login')">로그인</button>
        <button class="auth-tab ${!isLogin?'active':''}" onclick="_switchAuth('signup')">회원가입</button>
      </div>
      <div class="auth-field">
        <label>회사 이메일</label>
        <input id="authEmail" type="email" placeholder="name@kaongroup.com" autocomplete="username">
      </div>
      <div class="auth-field">
        <label>비밀번호 ${!isLogin?'<span style="color:#94a3b8">(8자 이상)</span>':''}</label>
        <input id="authPw" type="password" placeholder="••••••••" autocomplete="${isLogin?'current-password':'new-password'}" onkeydown="if(event.key==='Enter')_doAuth()">
      </div>
      <button class="auth-btn" id="authBtn" onclick="_doAuth()">${isLogin?'로그인':'가입하기'}</button>
      <div class="auth-msg" id="authMsg"></div>
      <div class="auth-hint">${isLogin?'계정이 없으면 위에서 [회원가입]을 눌러 가입하세요.':'허용된 회사 이메일: '+ALLOWED_DOMAINS.join(', ')}</div>
    </div>`;
  g.classList.add('show');
  setTimeout(()=>{const e=document.getElementById('authEmail');if(e)e.focus();},50);
}

function _switchAuth(m){_authMode=m;renderAuthGate();}

function _authMsg(text,type){
  const el=document.getElementById('authMsg');
  if(el){el.textContent=text;el.className='auth-msg'+(type?' '+type:'');}
}

async function _doAuth(){
  if(!_sb){_authMsg('서버 연결이 설정되지 않았습니다.','err');return;}
  const email=(document.getElementById('authEmail').value||'').trim();
  const pw=document.getElementById('authPw').value||'';
  const btn=document.getElementById('authBtn');
  if(!email||!pw){_authMsg('이메일과 비밀번호를 입력하세요.','err');return;}
  if(!_emailDomainOk(email)){_authMsg('회사 이메일('+ALLOWED_DOMAINS.join(', ')+')만 사용할 수 있습니다.','err');return;}
  btn.disabled=true;
  try{
    if(_authMode==='signup'){
      if(pw.length<8){_authMsg('비밀번호는 8자 이상이어야 합니다.','err');btn.disabled=false;return;}
      const {error}=await _sb.auth.signUp({email,password:pw});
      if(error)throw error;
      _authMsg('가입 완료! 로그인 중입니다…','ok');
      // 회원가입 후 곧바로 로그인 시도
      const {error:e2}=await _sb.auth.signInWithPassword({email,password:pw});
      if(e2){_switchAuth('login');_authMsg('가입은 됐습니다. 로그인해 주세요.','ok');btn.disabled=false;return;}
      await _onLoggedIn();
    }else{
      const {error}=await _sb.auth.signInWithPassword({email,password:pw});
      if(error)throw error;
      await _onLoggedIn();
    }
  }catch(e){
    let m=e.message||String(e);
    if(/Invalid login/i.test(m))m='이메일 또는 비밀번호가 올바르지 않습니다.';
    else if(/already registered|already exists/i.test(m))m='이미 가입된 이메일입니다. 로그인해 주세요.';
    else if(/at least/i.test(m))m='비밀번호가 너무 짧습니다 (8자 이상).';
    _authMsg(m,'err');
    btn.disabled=false;
  }
}

async function _onLoggedIn(){
  document.getElementById('authGate').classList.remove('show');
  await initData();
}

async function logout(){
  if(_sb){try{await _sb.auth.signOut();}catch(e){}}
  location.reload();
}

async function boot(){
  if(!_sb){
    // 서버 미연결: 로컬 데이터로 그냥 동작(개발/오프라인 대비)
    await initData();
    return;
  }
  try{
    const {data}=await _sb.auth.getSession();
    if(data && data.session){
      await initData();
    }else{
      renderAuthGate();
    }
  }catch(e){
    renderAuthGate();
  }
}

boot();
</script>
